# =====================================================
# Cloudflare Workers 配置 — PHX 个人主页
# 仅托管 Vite 构建产物（dist/）的纯静态资产部署
# 参考：https://developers.cloudflare.com/workers/static-assets/
# =====================================================

name = "phx-homepage"
compatibility_date = "2025-04-01"

# ---------- 静态资产 ----------
[assets]
# 构建产物目录（vite build 默认输出 dist）
directory = "./dist"
# SPA 模式：未匹配的路径回退到 index.html
not_found_handling = "single-page-application"
# 自动处理 URL 末尾斜杠（默认行为）
html_handling = "auto-trailing-slash"

# ---------- 自定义域绑定 ----------
# iPHX.io 已托管在 Cloudflare（同一账号下）
# 部署时会自动把 iPHX.io 与 www.iPHX.io 绑定到该 Worker
# 若首次部署遇到域名归属/zone 报错，请把下面两段注释掉，
# 改在 Cloudflare Dashboard → Workers → 你的 Worker → Settings → Domains & Routes 里手动添加
[[routes]]
pattern = "iphx.io"
custom_domain = true

[[routes]]
pattern = "www.iphx.io"
custom_domain = true

# ---------- 观测 ----------
[observability]
enabled = true
